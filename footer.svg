<svg width="800" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Liquid Gradients -->
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#70A5FD" />
      <stop offset="100%" stop-color="#38BDAE" />
    </linearGradient>
    <linearGradient id="blob2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BF74DD" />
      <stop offset="100%" stop-color="#70A5FD" />
    </linearGradient>
    
    <!-- Glass effect filter -->
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep dark background matching Tokyo Night -->
  <rect width="100%" height="100%" fill="#0D1117" />
  
  <!-- Animated liquid blobs behind the glass -->
  <g opacity="0.6">
    <circle cx="250" cy="80" r="80" fill="url(#blob1)">
      <animate attributeName="cx" values="250; 300; 250" dur="7s" repeatCount="indefinite" />
      <animate attributeName="cy" values="80; 50; 80" dur="5s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="550" cy="70" r="90" fill="url(#blob2)">
      <animate attributeName="cx" values="550; 500; 550" dur="8s" repeatCount="indefinite" />
      <animate attributeName="cy" values="70; 100; 70" dur="6s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Glass Morphism Card -->
  <rect x="150" y="30" width="500" height="90" rx="20" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" style="backdrop-filter: blur(10px);" />
  
  <!-- Subtle lighting on the glass edge -->
  <rect x="150" y="30" width="500" height="90" rx="20" fill="none" stroke="url(#blob2)" stroke-width="1" opacity="0.5" />

  <!-- Text Content -->
  <text x="400" y="80" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">Thanks for dropping by! 🚀</text>
</svg>
